<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071B2B"/><stop offset="1" stop-color="#102F42"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1640" cy="180" r="260" fill="#1ED6B8" opacity=".09" filter="url(#glow)"/>
  <circle cx="260" cy="950" r="300" fill="#FF8D7B" opacity=".08" filter="url(#glow)"/>
  <text x="130" y="132" fill="#70F0D8" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="7">PATIENT SAFETY IS A CONNECTION PROBLEM</text>
  <text x="130" y="255" fill="#F7FBFC" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="700">The information was there.</text>
  <text x="130" y="345" fill="#F7FBFC" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="700">It just never came together.</text>
  <g transform="translate(130 455)">
    <rect width="480" height="285" rx="28" fill="#15394C" stroke="#2D6274" stroke-width="2"/>
    <text x="40" y="88" fill="#70F0D8" font-family="Inter, Arial, sans-serif" font-size="98" font-weight="750">1 in 10</text>
    <text x="40" y="150" fill="#E8F0F2" font-family="Inter, Arial, sans-serif" font-size="31">patients experience harm</text>
    <line x1="40" y1="190" x2="440" y2="190" stroke="#2D6274" stroke-width="2"/>
    <text x="40" y="240" fill="#A8C0C8" font-family="Inter, Arial, sans-serif" font-size="24">in health care</text>
  </g>
  <g transform="translate(720 455)">
    <rect width="480" height="285" rx="28" fill="#15394C" stroke="#2D6274" stroke-width="2"/>
    <text x="40" y="88" fill="#FFB8A9" font-family="Inter, Arial, sans-serif" font-size="98" font-weight="750">~50%</text>
    <text x="40" y="150" fill="#E8F0F2" font-family="Inter, Arial, sans-serif" font-size="31">of harm is preventable</text>
    <line x1="40" y1="190" x2="440" y2="190" stroke="#2D6274" stroke-width="2"/>
    <text x="40" y="240" fill="#A8C0C8" font-family="Inter, Arial, sans-serif" font-size="24">the moments we can catch</text>
  </g>
  <g transform="translate(1310 455)">
    <rect width="480" height="285" rx="28" fill="#15394C" stroke="#2D6274" stroke-width="2"/>
    <text x="40" y="88" fill="#F7D878" font-family="Inter, Arial, sans-serif" font-size="98" font-weight="750">$42B</text>
    <text x="40" y="150" fill="#E8F0F2" font-family="Inter, Arial, sans-serif" font-size="31">annual medication-error cost</text>
    <line x1="40" y1="190" x2="440" y2="190" stroke="#2D6274" stroke-width="2"/>
    <text x="40" y="240" fill="#A8C0C8" font-family="Inter, Arial, sans-serif" font-size="24">globally</text>
  </g>
  <text x="130" y="865" fill="#F7FBFC" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="650">MedSignal connects the patient story before the moment passes.</text>
  <text x="130" y="1000" fill="#86A2AB" font-family="Inter, Arial, sans-serif" font-size="20">Sources: WHO Patient Safety; WHO Medication Without Harm</text>
</svg>
