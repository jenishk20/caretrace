  <text x="130" y="255" fill="#F7FBFC" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="750">A photograph can contain</text><text x="130" y="340" fill="#F7FBFC" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="750">a safety-critical connection.</text>
