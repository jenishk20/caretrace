    <rect x="104" y="216" width="150" height="48" rx="8" fill="#FFB8A9"/><text x="179" y="247" text-anchor="middle" fill="#612D25" font-size="22" font-weight="700">KETOROLAC</text>
    <text x="200" y="375" text-anchor="middle" fill="#70F0D8" font-size="25" font-weight="700">Local image + OCR</text>
    <path d="M452 195h150" stroke="#70F0D8" stroke-width="6"/><path d="M587 180l28 15-28 15" fill="#70F0D8"/>
    <rect x="650" width="430" height="390" rx="32" fill="#15394C" stroke="#376B7A" stroke-width="2"/><text x="695" y="76" fill="#70F0D8" font-size="24" font-weight="700" letter-spacing="3">EXTRACTED MEDICATION</text><text x="695" y="177" fill="#F7FBFC" font-size="55" font-weight="750">Ketorolac</text><text x="695" y="233" fill="#A8C0C8" font-size="28">matched against patient context</text>
