    <text x="150" y="270" text-anchor="middle" fill="#F7FBFC" font-size="37" font-weight="700">Original order</text><text x="150" y="316" text-anchor="middle" fill="#A8C0C8" font-size="27">Repeat EKG</text><text x="150" y="354" text-anchor="middle" fill="#A8C0C8" font-size="27">Open</text>
